name: Deploy Concept Pages to GitHub Pages

on:
  push:
    branches: [concept-pages]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: concept-pages

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: concepts/package-lock.json

      - name: Install + Build
        working-directory: ./concepts
        run: |
          npm ci
          npm run build

      - name: Copy dist to docs/
        run: cp -r concepts/dist/. docs/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
