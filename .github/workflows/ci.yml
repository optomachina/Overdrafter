name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # Checkout the repository so the same commands run in CI and locally.
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            worker/package-lock.json

      # Install root dependencies for the web app and repo-level tooling.
      - name: Install root dependencies
        run: npm ci

      # Install worker dependencies so worker verification matches local `npm run verify`.
      - name: Install worker dependencies
        run: npm --prefix worker ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm run test

      - name: Build app
        run: npm run build

      - name: Verify worker
        run: npm run verify:worker
