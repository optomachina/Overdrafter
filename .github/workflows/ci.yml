name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Build app
        run: npm run build

  verify-worker:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: worker/package-lock.json

      - name: Install worker dependencies
        run: npm --prefix worker ci

      - name: Verify worker
        run: npm run verify:worker

  ci:
    name: ci
    if: ${{ always() }}
    needs:
      - lint
      - typecheck
      - test
      - build
      - verify-worker
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check dependency results
        env:
          LINT_RESULT: ${{ needs.lint.result }}
          TYPECHECK_RESULT: ${{ needs.typecheck.result }}
          TEST_RESULT: ${{ needs.test.result }}
          BUILD_RESULT: ${{ needs.build.result }}
          WORKER_RESULT: ${{ needs.verify-worker.result }}
        run: |
          echo "lint=$LINT_RESULT"
          echo "typecheck=$TYPECHECK_RESULT"
          echo "test=$TEST_RESULT"
          echo "build=$BUILD_RESULT"
          echo "verify-worker=$WORKER_RESULT"

          if [ "$LINT_RESULT" != "success" ] || \
             [ "$TYPECHECK_RESULT" != "success" ] || \
             [ "$TEST_RESULT" != "success" ] || \
             [ "$BUILD_RESULT" != "success" ] || \
             [ "$WORKER_RESULT" != "success" ]; then
            exit 1
          fi
